name: WhatsApp Automation

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: whatsapp-automation
  cancel-in-progress: false

jobs:
  run-automation:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      AXIOMIX_BASE_URL: https://axiomix-v2.vercel.app
      AXIOMIX_CRON_SECRET: ${{ secrets.AXIOMIX_CRON_SECRET }}
    steps:
      - name: Validate cron secret
        shell: bash
        run: |
          test -n "$AXIOMIX_CRON_SECRET"

      - name: Trigger Sofia CRM sync
        shell: bash
        run: |
          curl --fail --silent --show-error \
            --header "x-cron-secret: $AXIOMIX_CRON_SECRET" \
            "$AXIOMIX_BASE_URL/api/cron/whatsapp-sync"

      - name: Process global async jobs
        shell: bash
        run: |
          curl --fail --silent --show-error \
            --request POST \
            --header "Content-Type: application/json" \
            --header "x-cron-secret: $AXIOMIX_CRON_SECRET" \
            --data '{"maxJobs":3}' \
            "$AXIOMIX_BASE_URL/api/jobs/process"

      - name: Process WhatsApp analyses
        shell: bash
        run: |
          curl --fail --silent --show-error \
            --header "x-cron-secret: $AXIOMIX_CRON_SECRET" \
            "$AXIOMIX_BASE_URL/api/cron/whatsapp-analyze"
